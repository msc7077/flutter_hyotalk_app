name: flutter_hyotalk_app
description: hyotalk is a communicatioin app for silver users and the staff who
  care for them.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Network
  dio: ^5.9.0

  # State Management
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1

  # Environment
  flutter_dotenv: ^6.0.0

  # UI
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Routing
  go_router: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.stage
    - .env.prod
    - pubspec.yaml
    - assets/images/
    - assets/icons/
  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/Noto_Sans_KR/NotoSansKR-Thin.otf
        - asset: assets/fonts/Noto_Sans_KR/NotoSansKR-Light.otf
        - asset: assets/fonts/Noto_Sans_KR/NotoSansKR-Regular.otf
        - asset: assets/fonts/Noto_Sans_KR/NotoSansKR-Medium.otf
        - asset: assets/fonts/Noto_Sans_KR/NotoSansKR-Bold.otf
        - asset: assets/fonts/Noto_Sans_KR/NotoSansKR-Black.otf
