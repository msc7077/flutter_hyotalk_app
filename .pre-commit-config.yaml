repos:
  # Flutter/Dart 포맷팅 (로컬 훅 사용)
  - repo: local
    hooks:
      - id: dart-format
        name: dart format
        entry: bash -c 'dart format "$@"' --
        language: system
        types: [dart]
        pass_filenames: true
        require_serial: true
      - id: dart-analyze
        name: dart analyze
        entry: 'bash -c "if command -v flutter >/dev/null 2>&1; then flutter analyze --fatal-warnings --fatal-infos || exit 1; elif command -v dart >/dev/null 2>&1; then dart analyze --fatal-warnings --fatal-infos || exit 1; else echo ''Error: flutter or dart not found in PATH''; exit 1; fi" --'
        language: system
        types: [dart]
        pass_filenames: false
        require_serial: true

  # 일반적인 코드 품질 훅
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
